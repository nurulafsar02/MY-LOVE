<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY LOVE</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}
body{
background:linear-gradient(135deg,#ffd6ea,#ffffff);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}
h1{
margin-top:20px;
font-size:36px;
color:#333;
}
.subtitle{
margin-top:5px;
color:#666;
}
/* flower picker */
.picker{
margin-top:40px;
display:flex;
flex-wrap:wrap;
gap:12px;
justify-content:center;
max-width:600px;
}
.picker button{
font-size:30px;
width:60px;
height:60px;
border:none;
border-radius:12px;
cursor:pointer;
background:white;
box-shadow:0 6px 14px rgba(0,0,0,0.1);
transition:0.2s;
}
.picker button:hover{
transform:scale(1.15);
}
/* bouquet */
#bouquet{
margin-top:40px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
min-height:150px;
}
.flower{
font-size:60px;
transform:scale(1);
position:relative;
}
/* grow animation */
.grow{
animation:growFlower 2s forwards;
}
@keyframes growFlower{
0%{transform:scale(0);opacity:0;}
50%{transform:scale(1.4);}
100%{transform:scale(1);opacity:1;}
}
/* buttons */
.controls{
margin-top:40px;
display:flex;
gap:15px;
}
.controls button{
padding:12px 25px;
border:none;
border-radius:25px;
font-size:16px;
cursor:pointer;
background:#ff4fa3;
color:white;
}
.controls button:hover{
opacity:0.9;
}
/* popup */
.popup-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:flex-start;
align-items:flex-start;
padding-left:20px;
padding-top:30px;
}
.popup{
background:white;
padding:30px;
border-radius:12px;
text-align:center;
max-width:320px;
}
.popup button{
margin-top:20px;
padding:8px 20px;
border:none;
border-radius:20px;
background:#ff4fa3;
color:white;
cursor:pointer;
}
.popup img {
  max-width: 100%;
  height: auto;
  border-radius: 12px;
  margin-bottom: 15px;
}
/* message */
#warning{
margin-top:20px;
color:red;
font-weight:bold;
}
</style>
</head>
<body>
<h1>WELCOME MY LOVE</h1>

<div class="picker" id="picker"></div>
<div id="bouquet"></div>
<div id="warning"></div>
<div class="controls">
<button id="submit">Submit</button>
<button id="clear">Clear</button>
</div>

<!-- popup -->
<div class="popup-bg" id="popupBg">
  <div class="popup">
<img src="WhatsApp Image 2026-03-15 at 23.36.59.jpeg" alt="Love Image" class="popup-img">    <h3>I love you my duniaya 🌸</h3>
    <p>You are the most Beautiful girl in the world !</p>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script>
// Flower list
const flowers=["🌹","🌸","🌷","🌻","🌼 ","💐","🌺","🪻","🥀"];
const picker=document.getElementById("picker");
const bouquet=document.getElementById("bouquet");
const warning=document.getElementById("warning");

// Create flower buttons
flowers.forEach(f=>{
  let btn=document.createElement("button");
  btn.innerText=f;
  btn.onclick=()=>addFlower(f);
  picker.appendChild(btn);
});

// Add flower
function addFlower(f){
  let div=document.createElement("div");
  div.className="flower";
  div.innerText=f;
  bouquet.appendChild(div);
}

// Clear bouquet
document.getElementById("clear").onclick=()=>{
  bouquet.innerHTML="";
  warning.innerText="";
}

// Submit
document.getElementById("submit").onclick=()=>{
  let count=bouquet.children.length;
  if(count<5){
    warning.innerText="⚠ Please select at least 5 different flowers";
    return;
  }
  warning.innerText="";
  // Animate flowers
  let flowersAll=document.querySelectorAll(".flower");
  flowersAll.forEach(f=>{f.classList.add("grow");});
  // Show popup after 2.5s
  setTimeout(()=>{
    document.getElementById("popupBg").style.display="flex";
  },1100);
}

// Close popup and refresh
function closePopup(){
  location.reload();
}
</script>
</body>
</html>
